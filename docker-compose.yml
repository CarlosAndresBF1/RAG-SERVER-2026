# docker-compose.yml

services:
  # ─── PostgreSQL + pgvector ──────────────────────────────
  postgres:
    image: pgvector/pgvector:0.7.4-pg16
    container_name: odyssey-rag-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-odyssey_rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag_user} -d ${POSTGRES_DB:-odyssey_rag}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - rag-net

  # ─── RAG API (FastAPI) ─────────────────────────────────
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: odyssey-rag-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-rag_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-odyssey_rag}

      # Embeddings (local nomic-embed-text)
      EMBEDDING_PROVIDER: nomic-local
      EMBEDDING_MODEL: nomic-ai/nomic-embed-text-v1.5
      EMBEDDING_DIMENSION: "768"

      # LLM provider
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:latest}

      # Reranker
      RERANKER_ENABLED: ${RERANKER_ENABLED:-true}
      RERANKER_MODEL: cross-encoder/ms-marco-MiniLM-L-6-v2

      # API auth
      API_KEYS: ${API_KEYS:-}

      # App
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${RAG_API_PORT:-8080}:8080"
    volumes:
      - rag-models:/app/models          # Cached model weights
      - ./data/sources:/app/sources    # Source documents (rw for uploads)
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - rag-net

  # ─── MCP Server ────────────────────────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: mcp
    container_name: odyssey-mcp-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database (MCP server queries DB directly via the retrieval engine)
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-rag_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-odyssey_rag}

      # Embeddings
      EMBEDDING_PROVIDER: nomic-local
      EMBEDDING_MODEL: nomic-ai/nomic-embed-text-v1.5
      EMBEDDING_DIMENSION: "768"

      # Reranker
      RERANKER_ENABLED: ${RERANKER_ENABLED:-true}
      RERANKER_MODEL: cross-encoder/ms-marco-MiniLM-L-6-v2

      # MCP transport (read by mcp_server/main.py via env vars)
      MCP_TRANSPORT: ${MCP_TRANSPORT:-http}
      MCP_PORT: "3000"

      # Ollama
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:latest}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}

      LOG_LEVEL: ${LOG_LEVEL:-info}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${MCP_PORT:-3000}:3000"
    volumes:
      - rag-models:/app/models          # Share cached model weights with api
    networks:
      - rag-net

  # ─── Admin Web UI ──────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: odyssey-rag-web
    restart: unless-stopped
    depends_on:
      rag-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      NEXTAUTH_URL: http://localhost:${WEB_PORT:-3001}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      RAG_API_URL: http://rag-api:8080
      RAG_INTERNAL_KEY: ${RAG_INTERNAL_KEY}
      AUTH_TRUST_HOST: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER:-rag_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-odyssey_rag}
    ports:
      - "${WEB_PORT:-3001}:3000"
    networks:
      - rag-net

volumes:
  pgdata:
    driver: local
  rag-models:
    driver: local

networks:
  rag-net:
    driver: bridge
